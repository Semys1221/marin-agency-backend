<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md">
<!-- 16:9 Presentation Container -->
<main class="w-full max-w-[1280px] aspect-16-9 bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden shadow-sm relative flex flex-col md:flex-row">
<!-- Left Section: Content -->
<div class="flex-1 flex flex-col p-lg md:p-xl justify-center h-full relative z-10">
<header class="mb-lg">
<span class="font-label-md text-label-md text-primary tracking-widest uppercase mb-sm block">Step 5 — Profil</span>
<h1 class="font-display-lg text-display-lg text-on-surface">Parlez-nous de votre activité</h1>
</header>
<form class="w-full max-w-2xl grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Business Type -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="business-type">
                        Type d'activité
                        <span class="w-2 h-2 rounded-full bg-primary block"></span>
</label>
<select class="w-full h-10 border-outline-variant rounded bg-surface focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface px-sm appearance-none transition-shadow duration-200" id="business-type">
<option disabled="" selected="" value="">Sélectionnez une option</option>
<option value="retail">Détaillant</option>
<option value="distributor">Distributeur</option>
<option value="manufacturer">Fabricant</option>
<option value="brand">Marque</option>
</select>
</div>
<!-- Monthly Volume -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-xs" for="monthly-volume">
                        Volume mensuel estimé
                        <span class="w-2 h-2 rounded-full bg-primary block"></span>
</label>
<select class="w-full h-10 border-outline-variant rounded bg-surface focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface px-sm appearance-none transition-shadow duration-200" id="monthly-volume">
<option disabled="" selected="" value="">Sélectionnez une option</option>
<option value="10k">&lt; 10,000 €</option>
<option value="50k">10,000 € - 50,000 €</option>
<option value="100k">50,000 € - 100,000 €</option>
<option value="100k+">&gt; 100,000 €</option>
</select>
</div>
<!-- Years Active -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="years-active">
                        Années d'activité
                    </label>
<select class="w-full h-10 border-outline-variant rounded bg-surface focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface px-sm appearance-none transition-shadow duration-200" id="years-active">
<option disabled="" selected="" value="">Sélectionnez une option</option>
<option value="1">Moins de 1 an</option>
<option value="3">1 à 3 ans</option>
<option value="5">3 à 5 ans</option>
<option value="10">Plus de 5 ans</option>
</select>
</div>
<!-- Sales Channels (Full Width) -->
<div class="flex flex-col gap-xs md:col-span-2 mt-sm">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs">
                        Canaux de vente (sélection multiple)
                    </label>
<div class="flex flex-wrap gap-sm">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-surface" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Boutique physique</span>
</label>
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-surface" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Site e-commerce (propre)</span>
</label>
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-surface" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Marketplaces (Amazon, etc.)</span>
</label>
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-surface" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Réseaux sociaux</span>
</label>

<span class="material-symbols-outlined text-[14px] text-on-primary">check</span>
</span>
<div class="flex-1 h-0.5 bg-primary mx-xs"></div>
<span class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary">check</span>
</span>
<div class="flex-1 h-0.5 bg-primary mx-xs"></div>
<span class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary">check</span>
</span>
<div class="flex-1 h-0.5 bg-primary mx-xs"></div>
<span class="w-6 h-6 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary">check</span>
