<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-md">
<!-- 16:9 Aspect Ratio Container for Presentation Slide -->
<div class="relative w-full max-w-[1280px] aspect-video bg-surface-container-lowest border border-outline-variant shadow-sm rounded-lg overflow-hidden flex flex-col">
<!-- Top Bar Indicator -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container-high">
<div class="h-full bg-primary" style="width: 63%;"></div>
</div>
<!-- Content Area -->
<div class="flex-1 flex px-xl py-lg relative z-10">
<!-- Left Side: Form Content -->
<div class="flex-1 flex flex-col max-w-[800px]">
<!-- Slide Header -->
<div class="mb-lg">
<span class="font-label-md text-label-md text-secondary uppercase tracking-widest mb-sm inline-block">Step 7 — Objectif</span>
<h1 class="font-display-lg text-display-lg text-on-surface">Quel est votre objectif?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-sm">Définissez vos cibles de volume et vos attentes budgétaires.</p>
</div>
<!-- Main Form Layout -->
<div class="grid grid-cols-2 gap-x-gutter gap-y-md w-full">
<!-- Volume Target -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="target_volume">Target Volume (Units/Mo)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">inventory_2</span>
<input class="w-full pl-[40px] pr-sm py-[10px] bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary text-body-md text-on-surface outline-none transition-all" id="target_volume" placeholder="e.g., 5000" type="number"/>
</div>
</div>
<!-- Monthly Budget -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="monthly_budget">Monthly Budget (€)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant">euro_symbol</span>
<input class="w-full pl-[40px] pr-sm py-[10px] bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary text-body-md text-on-surface outline-none transition-all" id="monthly_budget" placeholder="e.g., 15000" type="number"/>
</div>
</div>
<!-- Delivery Expectations -->
<div class="flex flex-col gap-xs col-span-2 mt-sm">
<label class="font-label-md text-label-md text-on-surface" for="delivery_expectations">Delivery Expectations</label>
<div class="relative">
<select class="w-full pl-sm pr-lg py-[10px] bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary text-body-md text-on-surface appearance-none outline-none transition-all cursor-pointer" id="delivery_expectations">
<option disabled="" selected="" value="">Select an option...</option>
<option value="standard">Standard (5-7 Business Days)</option>
<option value="expedited">Expedited (2-3 Business Days)</option>
<option value="scheduled">Scheduled / Just-in-Time</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Specific Needs (Checkboxes) -->
<div class="col-span-2 mt-md">
<label class="font-label-md text-label-md text-on-surface block mb-sm">Specific Requirements</label>
<div class="grid grid-cols-2 gap-sm">
<label class="flex items-center gap-sm p-sm border border-outline-variant rounded hover:border-primary cursor-pointer transition-colors group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Custom Packaging</span>
</label>
<label class="flex items-center gap-sm p-sm border border-outline-variant rounded hover:border-primary cursor-pointer transition-colors group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">Dedicated Account Manager</span>
</label>
<label class="flex items-center gap-sm p-sm border border-outline-variant rounded hover:border-primary cursor-pointer transition-colors group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">White-label Shipping</span>
</label>
<label class="flex items-center gap-sm p-sm border border-outline-variant rounded hover:border-primary cursor-pointer transition-colors group">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-0" type="checkbox"/>
<span class="font-body-sm text-body-sm text-on-surface group-hover:text-primary transition-colors">API Integration for Orders</span>

</div>
