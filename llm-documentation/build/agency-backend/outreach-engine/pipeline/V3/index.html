<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospection Manuelle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 2rem; font-size: 1.5rem; }
        h2 { margin: 1.5rem 0 1rem; font-size: 1.1rem; color: #888; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #aaa; }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
        }
        textarea { min-height: 80px; resize: vertical; }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #555;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .toggle-row input[type="checkbox"] { width: auto; }
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        button:hover { background: #ddd; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        button.secondary { background: #333; color: #e0e0e0; }
        button.secondary:hover { background: #444; }
        button.danger { background: #a33; color: #fff; }
        button.danger:hover { background: #c44; }
        #results {
            margin-top: 2rem;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 6px;
            display: none;
        }
        #results.visible { display: block; }
        .stats { margin-bottom: 1rem; font-size: 0.9rem; color: #aaa; }
        .lead-list {
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .lead-item {
            padding: 0.5rem;
            border-bottom: 1px solid #333;
        }
        .lead-item:last-child { border-bottom: none; }
        .lead-email { color: #7af; }
        .lead-company { color: #aaa; font-size: 0.8rem; }
        #log {
            margin-top: 1rem;
            padding: 1rem;
            background: #111;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        #log.visible { display: block; }
        .log-line { margin-bottom: 0.25rem; }
        .log-info { color: #aaa; }
        .log-success { color: #6c6; }
        .log-error { color: #c66; }
    </style>
</head>
<body>
    <h1>Prospection Manuelle</h1>

    <div>
        <label for="keywords">Keywords (un par ligne)</label>
        <textarea id="keywords" placeholder="agent immobilier paris&#10;agence immobilière lyon"></textarea>
    </div>

    <div>
        <label for="limit">Nombre de leads</label>
        <input type="number" id="limit" value="20" min="1" max="100">
    </div>

    <div class="toggle-row">
        <input type="checkbox" id="validate" checked>
        <label for="validate" style="margin: 0;">Valider les emails avant push</label>
    </div>

    <div>
        <label for="campaign">Campagne Instantly</label>
        <select id="campaign">
            <option value="">Chargement...</option>
        </select>
    </div>

    <div>
        <button id="btn-scrape">1. Scraper</button>
        <button id="btn-push" class="secondary" disabled>2. Pusher</button>
        <button id="btn-clear" class="danger">Effacer</button>
    </div>

    <div id="results">
        <div class="stats" id="stats"></div>
        <div class="lead-list" id="lead-list"></div>
    </div>

    <div id="log"></div>

    <script>
        const $ = (id) => document.getElementById(id);
        let currentLeads = [];

        function log(msg, type = "info") {
            const el = $("log");
            el.classList.add("visible");
            el.innerHTML += `<div class="log-line log-${type}">${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        function clearLog() {
            $("log").innerHTML = "";
            $("log").classList.remove("visible");
        }

        // Charger les campagnes Instantly
        async function loadCampaigns() {
            try {
                const r = await fetch("/api/campaigns");
                const campaigns = await r.json();
                const select = $("campaign");
                select.innerHTML = campaigns.length
                    ? campaigns.map(c => `<option value="${c.id}">${c.name}</option>`).join("")
                    : '<option value="">Aucune campagne trouvée</option>';
            } catch (e) {
                log("Erreur chargement campagnes: " + e.message, "error");
            }
        }

        // Scraper
        $("btn-scrape").addEventListener("click", async () => {
            const keywords = $("keywords").value.trim().split("\n").filter(k => k.trim());
            const limit = parseInt($("limit").value) || 20;

            if (!keywords.length) {
                log("Ajoute au moins un keyword", "error");
                return;
            }

            $("btn-scrape").disabled = true;
            clearLog();
            log(`Scraping: ${keywords.join(", ")} (limit ${limit})...`);

            try {
                const r = await fetch("/api/scrape", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ keywords, limit }),
                });
                const data = await r.json();

                if (!r.ok) throw new Error(data.detail || "Erreur API");

                let leads = data.leads;
                log(`${data.count} leads trouvés`, "success");

                // Validation emails si cochée
                if ($("validate").checked && leads.length > 0) {
                    log("Validation des emails...");
                    const r2 = await fetch("/api/validate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ leads }),
                    });
                    const data2 = await r2.json();
                    if (!r2.ok) throw new Error(data2.detail || "Erreur validation");
                    leads = data2.leads;
                    log(`${data2.valid}/${data2.total} emails valides`, "success");
                }

                currentLeads = leads;
                renderLeads();
                $("btn-push").disabled = leads.length === 0;
            } catch (e) {
                log("Erreur: " + e.message, "error");
            } finally {
                $("btn-scrape").disabled = false;
            }
        });

        // Push
        $("btn-push").addEventListener("click", async () => {
            const campaignId = $("campaign").value;
            if (!campaignId) {
                log("Sélectionne une campagne", "error");
                return;
            }
            if (!currentLeads.length) {
                log("Aucun lead à pusher", "error");
                return;
            }

            $("btn-push").disabled = true;
            log(`Pushing ${currentLeads.length} leads...`);

            try {
                const r = await fetch("/api/push", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ campaign_id: campaignId, leads: currentLeads }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.detail || "Erreur push");
                log(`${data.pushed} leads pushés avec succès`, "success");
            } catch (e) {
                log("Erreur push: " + e.message, "error");
            } finally {
                $("btn-push").disabled = false;
            }
        });

        // Clear
        $("btn-clear").addEventListener("click", () => {
            currentLeads = [];
            $("results").classList.remove("visible");
            $("btn-push").disabled = true;
            clearLog();
        });

        function renderLeads() {
            const results = $("results");
            const stats = $("stats");
            const list = $("lead-list");

            if (!currentLeads.length) {
                results.classList.remove("visible");
                return;
            }

            results.classList.add("visible");
            stats.textContent = `${currentLeads.length} leads prêts à pusher`;
            list.innerHTML = currentLeads.map(l => `
                <div class="lead-item">
                    <div class="lead-email">${l.email || "—"}</div>
                    <div class="lead-company">${l.company_name || ""} · ${l.location || ""}</div>
                </div>
            `).join("");
        }

        // Init
        loadCampaigns();
    </script>
</body>
</html>
