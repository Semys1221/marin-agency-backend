<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospection Manuelle V3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 2rem; max-width: 900px; margin: 0 auto; }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.85rem; }
        h2 { margin: 1.5rem 0 0.75rem; font-size: 1rem; color: #888; border-bottom: 1px solid #222; padding-bottom: 0.5rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.85rem; color: #aaa; }
        input, textarea, select { width: 100%; padding: 0.6rem 0.75rem; margin-bottom: 0.75rem; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 0.95rem; }
        textarea { min-height: 60px; resize: vertical; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #555; }
        .row { display: flex; gap: 1rem; }
        .row > div { flex: 1; }
        .toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
        .toggle-row input[type="checkbox"] { width: auto; margin: 0; }
        .toggle-row label { margin: 0; }
        button { background: #fff; color: #000; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-size: 0.9rem; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        button:hover { background: #ddd; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        button.secondary { background: #2a2a2a; color: #ccc; }
        button.secondary:hover { background: #3a3a3a; }
        button.success { background: #2a6e2a; color: #fff; }
        button.success:hover { background: #3a8e3a; }
        .steps { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }

        /* Queue list */
        .queue-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.2s; }
        .queue-item:hover { border-color: #444; }
        .queue-item.selected { border-color: #7af; }
        .queue-niche { font-weight: 600; }
        .queue-city { color: #888; font-size: 0.85rem; }
        .queue-status { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-left: 0.5rem; }
        .status-pending { background: #443; color: #ec6; }
        .status-scraping { background: #234; color: #6af; }
        .status-scraped { background: #234; color: #6af; }
        .status-cleaned { background: #243; color: #6c6; }
        .status-done { background: #1a1a1a; color: #888; }

        /* Leads table */
        .leads-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.5rem; }
        .leads-table th { text-align: left; padding: 0.4rem; border-bottom: 1px solid #333; color: #888; }
        .leads-table td { padding: 0.4rem; border-bottom: 1px solid #1a1a1a; }
        .leads-table .email { color: #7af; }

        #log { margin-top: 1rem; padding: 1rem; background: #111; border-radius: 6px; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; display: none; }
        #log.visible { display: block; }
        .log-line { margin-bottom: 0.25rem; }
        .log-info { color: #aaa; }
        .log-success { color: #6c6; }
        .log-error { color: #c66; }
    </style>
</head>
<body>
    <h1>Prospection Manuelle V3</h1>
    <div class="subtitle">Supabase + Smartlead — scrape, validate, push</div>

    <!-- Step 1: Create Queue -->
    <h2>1. Nouvelle prospection</h2>
    <div class="row">
        <div>
            <label for="niche">Niche</label>
            <input type="text" id="niche" placeholder="ex: agent immobilier">
        </div>
        <div>
            <label for="city">Ville</label>
            <input type="text" id="city" placeholder="ex: Paris">
        </div>
    </div>
    <div class="row">
        <div>
            <label for="keywords">Keywords (optionnel, virgule)</label>
            <input type="text" id="keywords" placeholder="ex: agence immobilière paris, immobilier paris">
        </div>
        <div>
            <label for="exclude">Exclure (optionnel)</label>
            <input type="text" id="exclude" placeholder="ex: location, étudiant">
        </div>
    </div>
    <button id="btn-create">Créer la prospection</button>

    <!-- Queue List -->
    <h2>2. Prospections en cours</h2>
    <div id="queue-list"></div>

    <!-- Actions for selected queue -->
    <div id="actions" style="display:none;">
        <h2>3. Actions</h2>
        <div class="row">
            <div>
                <label for="limit">Nombre de leads à scraper</label>
                <input type="number" id="limit" value="20" min="1" max="200">
            </div>
            <div>
                <label for="campaign">Campagne Smartlead</label>
                <select id="campaign"><option value="">Chargement...</option></select>
            </div>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="validate" checked>
            <label for="validate">Valider les emails après scrape</label>
        </div>
        <div class="steps">
            <button id="btn-scrape" class="secondary">Scraper</button>
            <button id="btn-validate" class="secondary" disabled>Valider emails</button>
            <button id="btn-push" class="success" disabled>Pusher vers Smartlead</button>
        </div>
    </div>

    <!-- Leads -->
    <div id="leads-section" style="display:none;">
        <h2>4. Leads</h2>
        <div id="leads-stats" style="margin-bottom: 0.5rem; font-size: 0.85rem; color: #888;"></div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="leads-table" id="leads-table">
                <thead><tr><th>Email</th><th>Entreprise</th><th>Ville</th><th>Statut</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="log"></div>

    <script>
        const $ = (id) => document.getElementById(id);
        let selectedQueueId = null;

        function log(msg, type = "info") {
            const el = $("log");
            el.classList.add("visible");
            el.innerHTML += `<div class="log-line log-${type}">${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        // Load queue list
        async function loadQueue() {
            try {
                const r = await fetch("/api/queue");
                const items = await r.json();
                const list = $("queue-list");
                if (!items.length) {
                    list.innerHTML = '<div style="color:#666;font-size:0.85rem;">Aucune prospection. Crée-en une ci-dessus.</div>';
                    return;
                }
                list.innerHTML = items.map(q => `
                    <div class="queue-item ${q.id === selectedQueueId ? 'selected' : ''}" onclick="selectQueue('${q.id}')">
                        <span class="queue-niche">${q.niche}</span>
                        <span class="queue-city"> · ${q.city}</span>
                        <span class="queue-status status-${q.status}">${q.status}</span>
                        ${q.include_keywords ? `<div style="font-size:0.8rem;color:#666;margin-top:0.25rem;">kw: ${q.include_keywords}</div>` : ''}
                    </div>
                `).join("");
            } catch (e) {
                log("Erreur chargement queue: " + e.message, "error");
            }
        }

        async function selectQueue(id) {
            selectedQueueId = id;
            $("actions").style.display = "block";
            loadQueue(); // refresh selection highlight
            await loadLeads();
        }

        // Load campaigns
        async function loadCampaigns() {
            try {
                const r = await fetch("/api/campaigns");
                const campaigns = await r.json();
                $("campaign").innerHTML = campaigns.length
                    ? campaigns.map(c => `<option value="${c.id}">${c.name}</option>`).join("")
                    : '<option value="">Aucune campagne</option>';
            } catch (e) {
                log("Erreur campagnes: " + e.message, "error");
                $("campaign").innerHTML = '<option value="">Erreur</option>';
            }
        }

        // Create queue
        $("btn-create").addEventListener("click", async () => {
            const niche = $("niche").value.trim();
            const city = $("city").value.trim();
            if (!niche || !city) { log("Niche et ville requis", "error"); return; }

            try {
                const r = await fetch("/api/queue", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        niche, city,
                        include_keywords: $("keywords").value.trim() || null,
                        exclude_keywords: $("exclude").value.trim() || null,
                    }),
                });
                const q = await r.json();
                log(`Prospection créée: ${niche} ${city} (${q.id})`, "success");
                loadQueue();
                $("niche").value = ""; $("city").value = ""; $("keywords").value = ""; $("exclude").value = "";
            } catch (e) {
                log("Erreur création: " + e.message, "error");
            }
        });

        // Scrape
        $("btn-scrape").addEventListener("click", async () => {
            if (!selectedQueueId) return;
            $("btn-scrape").disabled = true;
            const limit = parseInt($("limit").value) || 20;
            log(`Scraping ${limit} leads...`);
            try {
                const r = await fetch("/api/scrape", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ queue_id: selectedQueueId, limit }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.detail);
                log(`${data.scraped} leads scrapés`, "success");

                // Auto-validate if checked
                if ($("validate").checked && data.scraped > 0) {
                    $("btn-validate").click();
                }
                loadQueue();
                await loadLeads();
            } catch (e) {
                log("Erreur scrape: " + e.message, "error");
            } finally {
                $("btn-scrape").disabled = false;
            }
        });

        // Validate
        $("btn-validate").addEventListener("click", async () => {
            if (!selectedQueueId) return;
            $("btn-validate").disabled = true;
            log("Validation des emails...");
            try {
                const r = await fetch("/api/validate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ queue_id: selectedQueueId }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.detail);
                log(`${data.valid}/${data.total} emails valides`, "success");
                $("btn-push").disabled = data.valid === 0;
                loadQueue();
                await loadLeads();
            } catch (e) {
                log("Erreur validation: " + e.message, "error");
            } finally {
                $("btn-validate").disabled = false;
            }
        });

        // Push
        $("btn-push").addEventListener("click", async () => {
            if (!selectedQueueId) return;
            const campaignId = parseInt($("campaign").value);
            if (!campaignId) { log("Sélectionne une campagne", "error"); return; }
            $("btn-push").disabled = true;
            log("Push vers Smartlead...");
            try {
                const r = await fetch("/api/push", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ queue_id: selectedQueueId, smartlead_campaign_id: campaignId }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.detail);
                log(`${data.pushed} leads pushés vers Smartlead`, "success");
                loadQueue();
                await loadLeads();
            } catch (e) {
                log("Erreur push: " + e.message, "error");
            } finally {
                $("btn-push").disabled = false;
            }
        });

        // Load leads for selected queue
        async function loadLeads() {
            if (!selectedQueueId) return;
            try {
                const r = await fetch(`/api/leads?queue_id=${selectedQueueId}`);
                const leads = await r.json();
                const section = $("leads-section");
                if (!leads.length) {
                    section.style.display = "none";
                    return;
                }
                section.style.display = "block";

                // Stats
                const stats = {};
                leads.forEach(l => { stats[l.status] = (stats[l.status] || 0) + 1; });
                $("leads-stats").textContent = `${leads.length} leads — ${Object.entries(stats).map(([s,c]) => `${s}: ${c}`).join(", ")}`;

                // Table
                const tbody = $("leads-table").querySelector("tbody");
                tbody.innerHTML = leads.map(l => `
                    <tr>
                        <td class="email">${l.email || "—"}</td>
                        <td>${l.company_name || ""}</td>
                        <td>${l.city || ""}</td>
                        <td><span class="queue-status status-${l.status}">${l.status}</span></td>
                    </tr>
                `).join("");
            } catch (e) {
                log("Erreur leads: " + e.message, "error");
            }
        }

        // Init
        loadQueue();
        loadCampaigns();
    </script>
</body>
</html>
